<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <header>
        <h2>🏥 CarePulse Hospital</h2>
        <nav>
            <button onclick="showDashboard('admin')">Admin Portal</button>
            <button onclick="showDashboard('doctor')">Doctor Portal</button>
            <button onclick="showDashboard('patient')">Patient Portal</button>
        </nav>
    </header>

    <!-- Main Content Dynamic Container -->
    <main id="main-content">
        <div class="welcome-card">
            <h1>Welcome to the Hospital Management System</h1>
            <p>Select a portal from the navigation menu above to manage patients, doctors, and appointments.</p>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
